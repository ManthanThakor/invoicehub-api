{
  "name": "invoicehub-api",
  "type": "docker",
  "dockerfile": "Dockerfile",
  "ports": [{ "port": 5000, "protocol": "http" }],
  "env": {
    "ASPNETCORE_ENVIRONMENT": "Production",
    "Jwt__Issuer": "InvoiceHub",
    "Jwt__Audience": "InvoiceHub",
    "SuperAdmin__Email": "superadmin@invoicehub.in"
  },
  "secrets": [
    "ConnectionStrings__DefaultConnection",
    "Jwt__Secret",
    "SuperAdmin__Password"
  ]
}
